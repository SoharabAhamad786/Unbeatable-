<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Unbeatable Tic-Tac-Toe Bot - Play Now!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a8a5e6;
            --accent-color: #00cec9;
            --dark-color: #2d3436;
            --light-color: #f5f6fa;
            --danger-color: #d63031;
            --success-color: #00b894;
            --warning-color: #fdcb6e;
            --board-bg: #ffffff;
            --cell-hover: #e8e8e8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .title {
            text-align: center;
            color: var(--dark-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        .game-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 15px;
            color: white;
        }

        .turn-indicator {
            font-size: 1.2rem;
            font-weight: 600;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .score-board {
            display: flex;
            gap: 20px;
        }

        .score {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 10px;
        }

        .score-label {
            display: block;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .score-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-board {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: var(--dark-color);
            padding: 10px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--board-bg);
            border: none;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cell:hover:not(.disabled) {
            background: var(--cell-hover);
            transform: scale(0.98);
        }

        .cell.x {
            color: var(--primary-color);
        }

        .cell.o {
            color: var(--accent-color);
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .cell.winning {
            animation: winning-cell 0.5s ease infinite alternate;
        }

        @keyframes winning-cell {
            from {
                background: var(--warning-color);
                transform: scale(1);
            }
            to {
                background: var(--success-color);
                transform: scale(1.05);
            }
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
            background: var(--secondary-color);
        }

        .btn:active {
            transform: translateY(0);
        }

        #reset-score-btn {
            background: var(--dark-color);
            box-shadow: 0 4px 15px rgba(45, 52, 54, 0.3);
        }

        #reset-score-btn:hover {
            background: #2c3e50;
        }

        .lol-container {
            margin-top: 20px;
            text-align: center;
            animation: lol-appear 0.5s ease-out;
        }

        @keyframes lol-appear {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lol-message {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, var(--warning-color), var(--danger-color));
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(214, 48, 49, 0.3);
        }

        .lol-emoji {
            font-size: 2rem;
            animation: bounce 0.5s ease infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .lol-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Run Game Button */
        .run-game-container {
            text-align: center;
            margin-bottom: 20px;
        }

        #run-game-btn {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 176, 155, 0.4);
        }

        #run-game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 176, 155, 0.6);
        }

        #run-game-btn:active {
            transform: translateY(0);
        }

        .game-container {
            display: none;
        }

        /* Responsive Design */
        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
            
            .title {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .game-status {
                flex-direction: column;
                gap: 15px;
            }
            
            .score-board {
                width: 100%;
                justify-content: space-around;
            }
            
            .cell {
                font-size: 2rem;
            }
            
            .game-controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="run-game-container">
            <button id="run-game-btn">🎮 RUN GAME 🎮</button>
        </div>
        
        <div class="game-container" id="gameContainer">
            <h1 class="title">🤖 Unbeatable Tic-Tac-Toe 🤖</h1>
            <p class="subtitle">Can you survive the bot? (Spoiler: You can't!)</p>
            
            <div class="game-status">
                <div class="player-turn">
                    <span class="turn-indicator">Click Run Game to Start</span>
                </div>
                <div class="score-board">
                    <div class="score">
                        <span class="score-label">You</span>
                        <span class="score-value" id="player-score">0</span>
                    </div>
                    <div class="score">
                        <span class="score-label">Bot</span>
                        <span class="score-value" id="bot-score">0</span>
                    </div>
                    <div class="score">
                        <span class="score-label">Ties</span>
                        <span class="score-value" id="ties-score">0</span>
                    </div>
                </div>
            </div>

            <div class="game-board">
                <div class="board" id="board">
                    <!-- Cells will be generated by JavaScript -->
                </div>
            </div>

            <div class="game-controls">
                <button class="btn" id="restart-btn">🔄 New Game</button>
                <button class="btn" id="reset-score-btn">📊 Reset Score</button>
            </div>

            <div class="lol-container" id="lol-container" style="display: none;">
                <div class="lol-message">
                    <span class="lol-emoji">😂</span>
                    <span class="lol-text">You Lost! LOL!</span>
                    <span class="lol-emoji">😂</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const runGameBtn = document.getElementById('run-game-btn');
            const gameContainer = document.getElementById('gameContainer');
            
            runGameBtn.addEventListener('click', function() {
                gameContainer.style.display = 'block';
                runGameBtn.style.display = 'none';
                initializeGame();
            });
        });

        class TicTacToe {
            constructor() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X'; // X is human, O is bot
                this.gameActive = true;
                this.playerScore = 0;
                this.botScore = 0;
                this.tiesScore = 0;
                this.winningCombinations = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                    [0, 4, 8], [2, 4, 6] // Diagonals
                ];
                
                this.createBoard();
                this.attachEventListeners();
                this.updateTurnIndicator();
            }

            createBoard() {
                const boardElement = document.getElementById('board');
                boardElement.innerHTML = '';
                
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.index = i;
                    boardElement.appendChild(cell);
                }
            }

            attachEventListeners() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.addEventListener('click', (e) => this.handleCellClick(e));
                });

                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
                document.getElementById('reset-score-btn').addEventListener('click', () => this.resetScore());
            }

            handleCellClick(e) {
                const index = e.target.dataset.index;
                
                if (!this.gameActive || this.currentPlayer !== 'X' || this.board[index] !== '') {
                    return;
                }

                // Human move
                this.makeMove(index, 'X');
                
                if (this.gameActive) {
                    // Bot moves immediately
                    setTimeout(() => this.botMove(), 500);
                }
            }

            botMove() {
                if (!this.gameActive || this.currentPlayer !== 'O') return;
                
                const bestMove = this.getBestMove();
                if (bestMove !== -1) {
                    this.makeMove(bestMove, 'O');
                }
            }

            getBestMove() {
                // First, check if bot can win
                for (let combo of this.winningCombinations) {
                    const [a, b, c] = combo;
                    if (this.board[a] === 'O' && this.board[b] === 'O' && this.board[c] === '') return c;
                    if (this.board[a] === 'O' && this.board[c] === 'O' && this.board[b] === '') return b;
                    if (this.board[b] === 'O' && this.board[c] === 'O' && this.board[a] === '') return a;
                }

                // Then, block human's winning move
                for (let combo of this.winningCombinations) {
                    const [a, b, c] = combo;
                    if (this.board[a] === 'X' && this.board[b] === 'X' && this.board[c] === '') return c;
                    if (this.board[a] === 'X' && this.board[c] === 'X' && this.board[b] === '') return b;
                    if (this.board[b] === 'X' && this.board[c] === 'X' && this.board[a] === '') return a;
                }

                // Take center if available
                if (this.board[4] === '') return 4;

                // Take corners
                const corners = [0, 2, 6, 8];
                const availableCorners = corners.filter(i => this.board[i] === '');
                if (availableCorners.length > 0) {
                    return availableCorners[Math.floor(Math.random() * availableCorners.length)];
                }

                // Take any available edge
                const edges = [1, 3, 5, 7];
                const availableEdges = edges.filter(i => this.board[i] === '');
                if (availableEdges.length > 0) {
                    return availableEdges[Math.floor(Math.random() * availableEdges.length)];
                }

                return -1; // No moves available
            }

            makeMove(index, player) {
                if (this.board[index] !== '' || !this.gameActive) return;

                this.board[index] = player;
                this.updateCell(index, player);
                
                const result = this.checkGameStatus();
                
                if (result) {
                    this.handleGameEnd(result);
                } else {
                    this.currentPlayer = player === 'X' ? 'O' : 'X';
                    this.updateTurnIndicator();
                }
            }

            updateCell(index, player) {
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.textContent = player;
                cell.classList.add(player.toLowerCase());
                cell.classList.add('disabled');
            }

            checkGameStatus() {
                // Check for win
                for (let combo of this.winningCombinations) {
                    const [a, b, c] = combo;
                    if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                        return { type: 'win', player: this.board[a], combination: combo };
                    }
                }

                // Check for tie
                if (!this.board.includes('')) {
                    return { type: 'tie' };
                }

                return null;
            }

            handleGameEnd(result) {
                this.gameActive = false;
                
                if (result.type === 'win') {
                    this.highlightWinningCombination(result.combination);
                    
                    if (result.player === 'X') {
                        this.playerScore++;
                        this.showMessage('🎉 You won? That\'s impossible! 🎉');
                    } else {
                        this.botScore++;
                        this.showLOL();
                    }
                } else {
                    this.tiesScore++;
                    this.showMessage('🤔 It\'s a tie! The bot will get you next time! 🤔');
                }
                
                this.updateScores();
                this.disableAllCells();
            }

            highlightWinningCombination(combination) {
                combination.forEach(index => {
                    const cell = document.querySelector(`[data-index="${index}"]`);
                    cell.classList.add('winning');
                });
            }

            showLOL() {
                const lolContainer = document.getElementById('lol-container');
                lolContainer.style.display = 'block';
                
                // Hide after 3 seconds
                setTimeout(() => {
                    lolContainer.style.display = 'none';
                }, 3000);
            }

            showMessage(message) {
                // You can implement a toast or notification here
                console.log(message);
            }

            disableAllCells() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => cell.classList.add('disabled'));
            }

            updateTurnIndicator() {
                const indicator = document.querySelector('.turn-indicator');
                if (this.gameActive) {
                    indicator.textContent = this.currentPlayer === 'X' ? 'Your Turn' : 'Bot is thinking...';
                    indicator.style.animation = this.currentPlayer === 'X' ? 'pulse 1.5s infinite' : 'none';
                } else {
                    indicator.textContent = 'Game Over';
                }
            }

            updateScores() {
                document.getElementById('player-score').textContent = this.playerScore;
                document.getElementById('bot-score').textContent = this.botScore;
                document.getElementById('ties-score').textContent = this.tiesScore;
            }

            restartGame() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameActive = true;
                
                // Clear board
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('x', 'o', 'disabled', 'winning');
                });
                
                // Hide LOL container
                document.getElementById('lol-container').style.display = 'none';
                
                this.updateTurnIndicator();
            }

            resetScore() {
                this.playerScore = 0;
                this.botScore = 0;
                this.tiesScore = 0;
                this.updateScores();
                this.restartGame();
            }
        }

        function initializeGame() {
            new TicTacToe();
        }
    </script>
</body>
</html>
